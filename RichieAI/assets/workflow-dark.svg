<svg viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg" width="1200" height="820">
  <rect width="1200" height="820" fill="#0e2016" rx="16"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(255,255,255,0.3)"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════ -->
  <!-- LEFT: AUTH FLOW                -->
  <!-- ═══════════════════════════════ -->

  <!-- Notification -->
  <rect x="30" y="370" width="110" height="36" rx="8" fill="#4ade80"/>
  <text x="85" y="393" text-anchor="middle" font-family="Geist,sans-serif" font-size="12" font-weight="600" fill="#0a1a0f">Notification</text>

  <!-- Start label -->
  <text x="148" y="363" text-anchor="middle" font-family="Geist Mono,monospace" font-size="9" fill="rgba(255,255,255,0.3)">Start</text>
  <line x1="140" y1="388" x2="178" y2="388" stroke="rgba(255,255,255,0.25)" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Splash Screen -->
  <rect x="180" y="370" width="120" height="36" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="240" y="393" text-anchor="middle" font-family="Geist,sans-serif" font-size="11" fill="#e4e4e7">Splash Screen</text>

  <!-- Splash → Have account -->
  <line x1="300" y1="388" x2="338" y2="388" stroke="rgba(255,255,255,0.25)" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Have an account? diamond -->
  <polygon points="390,360 450,388 390,416 330,388" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="390" y="385" text-anchor="middle" font-family="Geist,sans-serif" font-size="10" fill="#a1a1aa">Have an</text>
  <text x="390" y="397" text-anchor="middle" font-family="Geist,sans-serif" font-size="10" fill="#a1a1aa">account?</text>

  <!-- Yes → Richie AI -->
  <line x1="450" y1="388" x2="498" y2="388" stroke="rgba(255,255,255,0.25)" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="472" y="381" text-anchor="middle" font-family="Geist Mono,monospace" font-size="9" fill="rgba(255,255,255,0.3)">Yes</text>

  <!-- No → down -->
  <line x1="390" y1="416" x2="390" y2="510" stroke="rgba(255,255,255,0.25)" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="400" y="468" font-family="Geist Mono,monospace" font-size="9" fill="rgba(255,255,255,0.3)">No</text>

  <!-- Create Account -->
  <rect x="330" y="512" width="120" height="36" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="390" y="535" text-anchor="middle" font-family="Geist,sans-serif" font-size="11" fill="#e4e4e7">Create Account</text>

  <!-- Create → Verify -->
  <line x1="330" y1="530" x2="282" y2="530" stroke="rgba(255,255,255,0.25)" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="306" y="522" text-anchor="middle" font-family="Geist Mono,monospace" font-size="9" fill="rgba(255,255,255,0.3)">Created</text>

  <!-- Verify Email diamond -->
  <polygon points="230,504 280,530 230,556 180,530" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="230" y="527" text-anchor="middle" font-family="Geist,sans-serif" font-size="10" fill="#a1a1aa">Verify</text>
  <text x="230" y="539" text-anchor="middle" font-family="Geist,sans-serif" font-size="10" fill="#a1a1aa">Email</text>

  <!-- Verified → up to auth level → Richie AI -->
  <line x1="230" y1="504" x2="230" y2="388" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>
  <line x1="230" y1="388" x2="498" y2="388" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="216" y="448" font-family="Geist Mono,monospace" font-size="9" fill="rgba(255,255,255,0.25)">Verified</text>

  <!-- Failed loop -->
  <line x1="180" y1="530" x2="140" y2="530" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="140" y1="530" x2="140" y2="590" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="140" y1="590" x2="330" y2="590" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="330" y1="590" x2="330" y2="548" stroke="rgba(255,255,255,0.15)" stroke-width="1" marker-end="url(#arr)"/>
  <text x="144" y="572" font-family="Geist Mono,monospace" font-size="9" fill="rgba(255,255,255,0.2)">Failed / Try again</text>

  <!-- ═══════════════════════════════ -->
  <!-- RICHIE AI BOX                  -->
  <!-- ═══════════════════════════════ -->

  <rect x="500" y="370" width="110" height="36" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="555" y="393" text-anchor="middle" font-family="Geist,sans-serif" font-size="11" fill="#e4e4e7">Richie AI</text>

  <!-- Richie AI → Hub -->
  <line x1="610" y1="388" x2="648" y2="388" stroke="rgba(255,255,255,0.25)" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- New Chat branch off Richie AI (upward) -->
  <line x1="555" y1="370" x2="555" y2="318" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>
  <line x1="555" y1="318" x2="608" y2="318" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- New Chat diamond -->
  <polygon points="655,292 705,318 655,344 605,318" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="655" y="315" text-anchor="middle" font-family="Geist,sans-serif" font-size="10" fill="#a1a1aa">New</text>
  <text x="655" y="327" text-anchor="middle" font-family="Geist,sans-serif" font-size="10" fill="#a1a1aa">Chat</text>

  <!-- New Chat → Chat started (left) -->
  <line x1="605" y1="318" x2="558" y2="318" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="462" y="302" width="94" height="32" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="509" y="322" text-anchor="middle" font-family="Geist,sans-serif" font-size="10" fill="#e4e4e7">Chat started</text>
  <text x="564" y="298" font-family="Geist Mono,monospace" font-size="8.5" fill="rgba(255,255,255,0.2)">Go Back</text>

  <!-- ═══════════════════════════════ -->
  <!-- CENTRAL HUB DIAMOND            -->
  <!-- ═══════════════════════════════ -->

  <polygon points="740,330 830,388 740,446 650,388" fill="#132a1c" stroke="#4ade80" stroke-width="1.8"/>
  <text x="740" y="380" text-anchor="middle" font-family="Geist,sans-serif" font-size="10" fill="#4ade80">Suggested Prompts</text>
  <text x="740" y="393" text-anchor="middle" font-family="Geist,sans-serif" font-size="10" fill="#4ade80">Trending Topics</text>
  <text x="740" y="406" text-anchor="middle" font-family="Geist,sans-serif" font-size="10" fill="#4ade80">Recent Chats</text>

  <!-- ═══════════════════════════════ -->
  <!-- TOP: SUGGESTED PROMPTS         -->
  <!-- ═══════════════════════════════ -->

  <!-- Hub → Suggested Prompts (up) -->
  <line x1="740" y1="330" x2="740" y2="252" stroke="#4ade80" stroke-width="1.2" stroke-opacity="0.5" marker-end="url(#arr-g)"/>

  <!-- Suggested Prompts node -->
  <rect x="676" y="216" width="128" height="36" rx="8" fill="#4ade80"/>
  <text x="740" y="239" text-anchor="middle" font-family="Geist,sans-serif" font-size="11" font-weight="600" fill="#0a1a0f">Suggested Prompts</text>

  <!-- → View all prompts diamond -->
  <line x1="740" y1="216" x2="740" y2="178" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" marker-end="url(#arr)"/>
  <polygon points="740,142 790,168 740,194 690,168" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="740" y="165" text-anchor="middle" font-family="Geist,sans-serif" font-size="10" fill="#a1a1aa">View all</text>
  <text x="740" y="177" text-anchor="middle" font-family="Geist,sans-serif" font-size="10" fill="#a1a1aa">prompts</text>

  <!-- → List of suggested prompts -->
  <line x1="740" y1="142" x2="740" y2="98" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="672" y="62" width="136" height="36" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="740" y="85" text-anchor="middle" font-family="Geist,sans-serif" font-size="10" fill="#e4e4e7">List of suggested prompts</text>

  <!-- → Refresh Prompt diamond -->
  <line x1="808" y1="80" x2="860" y2="80" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" marker-end="url(#arr)"/>
  <polygon points="920,54 980,80 920,106 860,80" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="920" y="77" text-anchor="middle" font-family="Geist,sans-serif" font-size="10" fill="#a1a1aa">Refresh</text>
  <text x="920" y="89" text-anchor="middle" font-family="Geist,sans-serif" font-size="10" fill="#a1a1aa">Prompt</text>

  <!-- Refresh → Chat started (loop right side) -->
  <line x1="980" y1="80" x2="1060" y2="80" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="1060" y1="80" x2="1060" y2="318" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="1060" y1="318" x2="1018" y2="318" stroke="rgba(255,255,255,0.15)" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="924" y="302" width="92" height="32" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="970" y="322" text-anchor="middle" font-family="Geist,sans-serif" font-size="10" fill="#e4e4e7">Chat started</text>
  <text x="1064" y="200" font-family="Geist Mono,monospace" font-size="8.5" fill="rgba(255,255,255,0.2)">Go Back</text>

  <!-- ═══════════════════════════════ -->
  <!-- RIGHT: RECENT CHATS            -->
  <!-- ═══════════════════════════════ -->

  <!-- Hub → Recent Chats label + arrow -->
  <line x1="830" y1="388" x2="878" y2="388" stroke="#4ade80" stroke-width="1.2" stroke-opacity="0.5" marker-end="url(#arr-g)"/>
  <text x="852" y="380" text-anchor="middle" font-family="Geist Mono,monospace" font-size="8.5" fill="rgba(255,255,255,0.3)">Recent Chats</text>

  <!-- List of Recent Chats diamond -->
  <polygon points="940,362 1000,388 940,414 880,388" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="940" y="385" text-anchor="middle" font-family="Geist,sans-serif" font-size="9.5" fill="#a1a1aa">List of Recent</text>
  <text x="940" y="397" text-anchor="middle" font-family="Geist,sans-serif" font-size="9.5" fill="#a1a1aa">Chats</text>

  <!-- Pick a chat → Chat started -->
  <line x1="1000" y1="388" x2="1048" y2="388" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="1022" y="380" text-anchor="middle" font-family="Geist Mono,monospace" font-size="8.5" fill="rgba(255,255,255,0.3)">Pick a chat</text>
  <rect x="1050" y="372" width="92" height="32" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="1096" y="392" text-anchor="middle" font-family="Geist,sans-serif" font-size="10" fill="#e4e4e7">Chat started</text>

  <!-- Go back Recent Chats -->
  <text x="882" y="434" font-family="Geist Mono,monospace" font-size="8.5" fill="rgba(255,255,255,0.2)">Go back</text>
  <line x1="880" y1="388" x2="830" y2="388" stroke="rgba(255,255,255,0.0)" stroke-width="0"/>

  <!-- ═══════════════════════════════ -->
  <!-- BOTTOM: TRENDING TOPICS        -->
  <!-- ═══════════════════════════════ -->

  <!-- Hub → Trending Topics (down) -->
  <line x1="740" y1="446" x2="740" y2="524" stroke="#4ade80" stroke-width="1.2" stroke-opacity="0.5" marker-end="url(#arr-g)"/>

  <!-- Trending Topics node -->
  <rect x="676" y="526" width="128" height="36" rx="8" fill="#4ade80"/>
  <text x="740" y="549" text-anchor="middle" font-family="Geist,sans-serif" font-size="11" font-weight="600" fill="#0a1a0f">Trending Topics</text>

  <!-- → List of trending topics diamond -->
  <line x1="740" y1="562" x2="740" y2="610" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" marker-end="url(#arr)"/>
  <polygon points="740,612 800,638 740,664 680,638" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="740" y="635" text-anchor="middle" font-family="Geist,sans-serif" font-size="9.5" fill="#a1a1aa">List of</text>
  <text x="740" y="647" text-anchor="middle" font-family="Geist,sans-serif" font-size="9.5" fill="#a1a1aa">Trending topics</text>

  <!-- Pick a topic → Chat started -->
  <line x1="800" y1="638" x2="860" y2="638" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="828" y="630" text-anchor="middle" font-family="Geist Mono,monospace" font-size="8.5" fill="rgba(255,255,255,0.3)">Pick a topic</text>
  <rect x="862" y="622" width="92" height="32" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="908" y="642" text-anchor="middle" font-family="Geist,sans-serif" font-size="10" fill="#e4e4e7">Chat started</text>

  <!-- Go back Trending -->
  <line x1="680" y1="638" x2="590" y2="638" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="590" y1="638" x2="590" y2="446" stroke="rgba(255,255,255,0.15)" stroke-width="1" marker-end="url(#arr)"/>
  <text x="594" y="700" font-family="Geist Mono,monospace" font-size="8.5" fill="rgba(255,255,255,0.2)">Go Back</text>

  <!-- Bottom Go Back label -->
  <text x="740" y="760" text-anchor="middle" font-family="Geist Mono,monospace" font-size="8.5" fill="rgba(255,255,255,0.2)">Go Back</text>
  <line x1="740" y1="664" x2="740" y2="748" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="500" y1="748" x2="1000" y2="748" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

</svg>
